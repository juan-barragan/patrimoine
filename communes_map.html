<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Communes de France — TopoJSON</title>
<link href="https://unpkg.com/maplibre-gl@3/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@3/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; font-size: 13px; background: #111; }
#map { position: absolute; inset: 0; }

#loader {
  position: absolute; inset: 0; z-index: 900;
  background: #1b2631;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; color: #ecf0f1;
  transition: opacity .5s ease;
}
#loader.fade { opacity: 0; pointer-events: none; }
#loader h2 { font-size: 16px; font-weight: 600; }
#loader-msg { font-size: 11.5px; color: #7f8c8d; }

.maplibregl-popup-content {
  padding: 10px 14px !important;
  border-radius: 8px !important;
  font-size: 13px;
  max-width: 280px !important;
}
.popup-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.popup-info { color: #555; line-height: 1.5; }
</style>
</head>
<body>

<div id="loader">
  <h2>Chargement des communes...</h2>
  <div id="loader-msg">Initialisation...</div>
</div>

<div id="map"></div>

<script>
'use strict';

// Lambert-93 (EPSG:2154) definition
proj4.defs('EPSG:2154', '+proj=lcc +lat_0=46.5 +lon_0=3 +lat_1=49 +lat_2=44 +x_0=700000 +y_0=6600000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs');

function msg(txt) { document.getElementById('loader-msg').textContent = txt; }

function reprojectCoords(coords) {
  if (typeof coords[0] === 'number') {
    return proj4('EPSG:2154', 'EPSG:4326', coords);
  }
  return coords.map(c => reprojectCoords(c));
}

(async () => {
  try {
    msg('Chargement du TopoJSON...');
    const resp = await fetch('./a-com2022-topo-2154.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const topoData = await resp.json();

    msg('Conversion TopoJSON vers GeoJSON...');
    const geojson = topojson.feature(topoData, topoData.objects.a_com2022);

    msg(`Reprojection de ${geojson.features.length} communes (Lambert-93 → WGS84)...`);
    for (const feat of geojson.features) {
      feat.geometry.coordinates = reprojectCoords(feat.geometry.coordinates);
    }

    msg('Initialisation de la carte...');
    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/positron',
      center: [2.5, 46.5],
      zoom: 5.5,
      attributionControl: false,
    });
    map.addControl(new maplibregl.NavigationControl(), 'top-left');

    await new Promise(res => map.once('load', res));

    msg('Ajout des communes...');
    map.addSource('communes', { type: 'geojson', data: geojson });

    map.addLayer({
      id: 'communes-fill',
      type: 'fill',
      source: 'communes',
      paint: {
        'fill-color': '#3498db',
        'fill-opacity': 0.15,
      },
    });

    map.addLayer({
      id: 'communes-border',
      type: 'line',
      source: 'communes',
      paint: {
        'line-color': '#2c3e50',
        'line-width': ['interpolate', ['linear'], ['zoom'], 5, 0.1, 10, 0.8, 14, 1.5],
        'line-opacity': 0.5,
      },
    });

    // Popup on click
    const popup = new maplibregl.Popup({ maxWidth: '280px', offset: 4 });

    map.on('click', 'communes-fill', (e) => {
      const p = e.features[0].properties;
      popup
        .setLngLat(e.lngLat)
        .setHTML(`
          <div class="popup-name">${p.libgeo || '—'}</div>
          <div class="popup-info">
            Code INSEE : ${p.codgeo || '—'}<br>
            Département : ${p.dep || '—'}<br>
            Région : ${p.reg || '—'}
          </div>
        `)
        .addTo(map);
    });

    map.on('mouseenter', 'communes-fill', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'communes-fill', () => { map.getCanvas().style.cursor = ''; });

    // Hide loader
    const loader = document.getElementById('loader');
    loader.classList.add('fade');
    setTimeout(() => loader.remove(), 550);

  } catch (err) {
    msg('Erreur : ' + err.message);
    console.error(err);
  }
})();
</script>
</body>
</html>
